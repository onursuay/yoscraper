<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <title>Yo Scraper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; min-height: 100vh; }

        /* Header */
        .header { background: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 20px; color: #111827; }
        .header .badge { background: #8b5cf6; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a { color: #6b7280; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: all 0.15s; }
        .nav-links a:hover { background: #e5e7eb; color: #111827; }

        /* Toolbar */
        .toolbar { padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 12px; }

        .search-box { padding: 8px 14px; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; color: #111827; font-size: 13px; width: 280px; outline: none; }
        .search-box:focus { border-color: #8b5cf6; }

        .filter-select { padding: 8px 12px; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; color: #111827; font-size: 13px; outline: none; }
        .filter-select:focus { border-color: #8b5cf6; }

        .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-primary { background: #8b5cf6; color: white; }
        .btn-primary:hover { background: #7c3aed; }
        .btn-outline { background: transparent; border: 1px solid #e5e7eb; color: #6b7280; }
        .btn-outline:hover { border-color: #8b5cf6; color: #111827; }

        .stat-pills { display: flex; gap: 8px; }
        .stat-pill { padding: 4px 12px; background: #f1f5f9; border-radius: 20px; font-size: 12px; color: #6b7280; }
        .stat-pill strong { color: #111827; margin-right: 4px; }

        /* Sticky zone: only toolbar + tabs */
        .sticky-zone {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #f8fafc;
        }

        /* Table wrapper: scrollable, thead sticky inside same table */
        .table-container { padding: 0 32px 32px; }
        .table-card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
        .table-scroll { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 280px); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 900px; }

        thead th { position: sticky; top: 0; z-index: 10; background: #f1f5f9; padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #9ca3af; border-bottom: 1px solid #e5e7eb; cursor: pointer; user-select: none; white-space: nowrap; }
        thead th:hover { color: #6b7280; }
        thead th.sorted { color: #8b5cf6; }
        th .sort-icon { margin-left: 4px; font-size: 10px; }

        td { padding: 8px 14px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,0.3); color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover td { background: rgba(139,92,246,0.04); }

        .source-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .source-scanner { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .source-lead { background: rgba(16,185,129,0.15); color: #34d399; }

        .social-link { color: #6b7280; text-decoration: none; margin-right: 6px; font-size: 12px; }
        .social-link:hover { color: #111827; }
        .social-link.ig { color: #e1306c; }
        .social-link.li { color: #0077b5; }

        .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: #9ca3af; }


        /* Pagination */
        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-top: 1px solid #e5e7eb; }
        .pagination .info { font-size: 12px; color: #9ca3af; }
        .page-btns { display: flex; gap: 4px; }
        .page-btn { padding: 6px 12px; background: #f1f5f9; border: 1px solid #e5e7eb; border-radius: 6px; color: #6b7280; font-size: 12px; cursor: pointer; }
        .page-btn:hover { border-color: #8b5cf6; }
        .page-btn.active { background: #8b5cf6; color: white; border-color: #8b5cf6; }

        /* Column header with filter icon */
        .th-content {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .th-label { cursor: pointer; }
        .th-filter-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            transition: all 0.15s;
            opacity: 0.3;
        }
        .th-filter-btn:hover { opacity: 0.7; background: rgba(255,255,255,0.05); }
        .th-filter-btn.active { opacity: 1; }
        .th-filter-btn svg { width: 12px; height: 12px; stroke: #94a3b8; fill: none; stroke-width: 2; }
        .th-filter-btn.active svg { stroke: #8b5cf6; }

        /* Filter popover */
        .filter-popover {
            display: none;
            position: fixed;
            margin-top: 4px;
            background: #ffffff;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 10px;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 220px;
        }
        .filter-popover.open { display: block; }
        .filter-popover input {
            width: 100%;
            padding: 7px 10px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            color: #111827;
            font-size: 12px;
            outline: none;
        }
        .filter-popover input:focus { border-color: #8b5cf6; }
        .filter-popover .fp-actions {
            display: flex;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 6px;
        }
        .filter-popover .fp-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .fp-btn-clear { background: #e5e7eb; color: #6b7280; }
        .fp-btn-clear:hover { background: #475569; }

        /* Page size select */
        .page-size-select {
            padding: 5px 8px;
            background: #f1f5f9;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            color: #111827;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .page-size-select:focus { border-color: #8b5cf6; }

        /* Tabs */
        .tab-bar { display: flex; gap: 0; border-bottom: 2px solid #e5e7eb; margin: 0 32px; }
        .tab-btn { padding: 12px 24px; border: none; background: transparent; color: #9ca3af; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
        .tab-btn:hover { color: #111827; }
        .tab-btn.active { color: #8b5cf6; border-bottom-color: #8b5cf6; }
        .tab-badge { display: inline-block; background: #e5e7eb; color: #6b7280; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
        .tab-btn.active .tab-badge { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

{% include 'header.html' %}

<div class="sticky-zone">
    <!-- Tab bar -->
    <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" id="tab-scanner" onclick="switchTab('scanner')">
            Scanner <span class="tab-badge" id="badge-scanner">0</span>
        </button>
        <button class="tab-btn" id="tab-leads" onclick="switchTab('leads')">
            Import <span class="tab-badge" id="badge-leads">0</span>
        </button>
    </div>

    <!-- SCANNER toolbar -->
    <div id="toolbar-scanner" class="toolbar">
        <div class="toolbar-left">
            <input type="text" class="search-box" id="searchBox" placeholder="Firma, e-posta, domain ara..." data-i18n-ph="db-search-ph" oninput="applyFilters()">
            <select class="filter-select" id="sectorFilter" onchange="applyFilters()">
                <option value="" data-i18n="all-sectors">Tüm Sektörler</option>
            </select>
            <div class="stat-pills" id="statPills"></div>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-outline" id="dbDeleteBtn" style="display:none; background:#ef4444; color:white; border-color:#ef4444;" onclick="deleteSelectedDb()" data-i18n="del-sel-btn">Seçilenleri Sil</button>
            <button class="btn btn-outline" onclick="loadData()" data-i18n="refresh-btn">Yenile</button>
        </div>
    </div>

    <!-- LEADS toolbar -->
    <div id="toolbar-leads" class="toolbar hidden">
        <div class="toolbar-left">
            <input type="text" class="search-box" id="leadsSearchBox" placeholder="Ad, soyad, e-posta, şehir ara..." data-i18n-ph="leads-search-ph" oninput="applyLeadsFilters()">
            <div class="stat-pills" id="leadsStatPills"></div>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-outline" id="leadsDeleteBtn" style="display:none; background:#ef4444; color:white; border-color:#ef4444;" onclick="deleteSelectedLeads()" data-i18n="del-sel-btn">Seçilenleri Sil</button>
            <button class="btn btn-outline" onclick="loadLeads()" data-i18n="refresh-btn">Yenile</button>
        </div>
    </div>

</div><!-- /sticky-zone -->

<div class="table-container">
    <!-- SCANNER table: thead + tbody in one table -->
    <div id="tbody-scanner-wrap" class="table-card">
        <div class="table-scroll">
            <table>
                <colgroup>
                    <col style="width:40px">
                    <col style="width:140px">
                    <col style="width:130px">
                    <col style="width:200px">
                    <col style="width:140px">
                    <col style="width:220px">
                    <col style="width:150px">
                    <col style="width:46px">
                    <col style="width:46px">
                    <col style="width:46px">
                </colgroup>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="dbCheckAll" onchange="toggleAllDb(this)"></th>
                        <th><span class="th-label" onclick="sortBy('date')" data-i18n="th-date">Tarih</span></th>
                        <th><span class="th-label" onclick="sortBy('sector')" data-i18n="th-sector">Sektör</span></th>
                        <th><span class="th-label" onclick="sortBy('name')" data-i18n="th-company">Firma Adı</span></th>
                        <th><span class="th-label" onclick="sortBy('phone')" data-i18n="th-phone">Telefon</span></th>
                        <th><span class="th-label" onclick="sortBy('email')" data-i18n="th-email">E-posta</span></th>
                        <th><span class="th-label" onclick="sortBy('domain')">Domain</span></th>
                        <th>INS</th>
                        <th>FB</th>
                        <th>LNK</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="10" class="empty-state"><h3 data-i18n="sm-loading">Yükleniyor...</h3></td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination">
            <div style="display:flex; align-items:center; gap:12px;">
                <span class="info" id="pageInfo">-</span>
                <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()" style="appearance:none;-webkit-appearance:none;">
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
                <span class="info" data-i18n="db-per-page">kayıt/sayfa</span>
            </div>
            <div class="page-btns" id="pageBtns"></div>
        </div>
    </div>

    <!-- LEADS table: thead + tbody in one table -->
    <div id="tbody-leads-wrap" class="table-card hidden">
        <div class="table-scroll">
            <table>
                <colgroup>
                    <col style="width:40px">
                    <col style="width:160px">
                    <col style="width:140px">
                    <col style="width:140px">
                    <col style="width:180px">
                    <col style="width:260px">
                    <col style="width:120px">
                </colgroup>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="leadsCheckAll" onchange="toggleAllLeads(this)"></th>
                        <th><span class="th-label" onclick="leadsSort('date')" data-i18n="ext-db-date">Tarih</span></th>
                        <th><span class="th-label" onclick="leadsSort('first_name')" data-i18n="ext-db-first">Adı</span></th>
                        <th><span class="th-label" onclick="leadsSort('last_name')" data-i18n="ext-db-last">Soyadı</span></th>
                        <th><span class="th-label" onclick="leadsSort('phone')" data-i18n="ext-db-phone">Telefon Numarası</span></th>
                        <th><span class="th-label" onclick="leadsSort('email')" data-i18n="ext-db-email">Email Adresi</span></th>
                        <th><span class="th-label" onclick="leadsSort('city')" data-i18n="ext-db-city">Şehir</span></th>
                    </tr>
                </thead>
                <tbody id="leadsTbody">
                    <tr><td colspan="7" class="empty-state"><h3 data-i18n="sm-loading">Yükleniyor...</h3></td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination">
            <div style="display:flex; align-items:center; gap:12px;">
                <span class="info" id="leadsPageInfo">-</span>
                <select class="page-size-select" id="leadsPageSizeSelect" onchange="changeLeadsPageSize()" style="appearance:none;-webkit-appearance:none;">
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
                <span class="info" data-i18n="db-per-page">kayıt/sayfa</span>
            </div>
            <div class="page-btns" id="leadsPageBtns"></div>
        </div>
    </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────
let activeTab = 'scanner';

// Scanner
let allData = [];
let filteredData = [];
let currentSort = { field: 'name', asc: true };
let currentPage = 1;
let PAGE_SIZE = 50;
let scannerSelectAll = false;

// Leads
let leadsData = [];
let leadsFiltered = [];
let leadsCurrentSort = { field: 'date', asc: false };
let leadsPage = 1;
let LEADS_PAGE_SIZE = 50;
let leadsSelectAll = false;

// ─── TAB SWITCHING ────────────────────────────────────────────────────────
function switchTab(tab) {
    activeTab = tab;
    ['scanner','leads'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        document.getElementById('toolbar-' + t).classList.toggle('hidden', t !== tab);
        document.getElementById('tbody-' + t + '-wrap').classList.toggle('hidden', t !== tab);
    });
}

// ─── SCANNER ──────────────────────────────────────────────────────────────
function loadData() {
    fetch('/api/database')
        .then(r => r.json())
        .then(response => {
            if (response.error) { alert(response.error); return; }
            allData = response.data;
            document.getElementById('badge-scanner').textContent = allData.length;
            updateSectorFilter();
            applyFilters();
        });
}

function updateSectorFilter() {
    const sectors = [...new Set(allData.map(d => d.sector).filter(Boolean))].sort();
    const sel = document.getElementById('sectorFilter');
    sel.innerHTML = `<option value="">${t('all-sectors','Tüm Sektörler')}</option>` +
        sectors.map(s => `<option value="${s}">${s}</option>`).join('');
}

function applyFilters() {
    const q = (document.getElementById('searchBox').value || '').toLowerCase();
    const sector = document.getElementById('sectorFilter').value;

    filteredData = allData.filter(d => {
        if (sector && d.sector !== sector) return false;
        if (q) {
            const s = `${d.name} ${d.email} ${d.domain} ${d.phone} ${d.sector}`.toLowerCase();
            if (!s.includes(q)) return false;
        }
        return true;
    });

    filteredData.sort((a, b) => {
        const va = (a[currentSort.field] || '').toLowerCase();
        const vb = (b[currentSort.field] || '').toLowerCase();
        const cmp = va.localeCompare(vb, 'tr');
        return currentSort.asc ? cmp : -cmp;
    });

    currentPage = 1;
    renderTable();

    document.getElementById('statPills').innerHTML = `
        <div class="stat-pill"><strong>${filteredData.length}</strong> ${t('stat-found','Bulunan')}</div>
        <div class="stat-pill"><strong>${allData.filter(d=>d.email).length}</strong> ${t('sm-w-email','E-postalı')}</div>
    `;
}

function sortBy(field) {
    if (currentSort.field === field) currentSort.asc = !currentSort.asc;
    else { currentSort.field = field; currentSort.asc = true; }
    applyFilters();
}

function renderTable() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const pageData = filteredData.slice(start, end);
    const tbody = document.getElementById('tbody');

    if (!pageData.length) {
        tbody.innerHTML = `<tr><td colspan="10" class="empty-state"><h3>${t('dom-no-records','Kayıt bulunamadı')}</h3></td></tr>`;
        document.getElementById('pageInfo').textContent = '-';
        document.getElementById('pageBtns').innerHTML = '';
        return;
    }

    tbody.innerHTML = pageData.map(d => `<tr>
        <td><input type="checkbox" class="db-check" value="${d.id}" data-source="${d.source}" data-row="${d.sheet_row}" onchange="updateDbActions()"></td>
        <td>${d.date || '-'}</td>
        <td>${d.sector || '-'}</td>
        <td title="${d.name}">${d.name || '-'}</td>
        <td>${d.phone || '-'}</td>
        <td>${d.email || '-'}</td>
        <td>${d.domain || '-'}</td>
        <td>${d.instagram ? '<a href="' + d.instagram + '" target="_blank" class="social-link ig">IG</a>' : '-'}</td>
        <td>${d.facebook ? '<a href="' + d.facebook + '" target="_blank" class="social-link" style="color:#1877f2">FB</a>' : '-'}</td>
        <td>${d.linkedin ? '<a href="' + d.linkedin + '" target="_blank" class="social-link li">LI</a>' : '-'}</td>
    </tr>`).join('');

    const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
    document.getElementById('pageInfo').textContent =
        `${start + 1}-${Math.min(end, filteredData.length)} / ${filteredData.length} ${t('sm-records','kayıt')}`;
    let btns = '';
    for (let p = 1; p <= totalPages; p++) {
        if (totalPages > 7 && p > 3 && p < totalPages - 2 && Math.abs(p - currentPage) > 1) {
            if (p === 4) btns += '<span class="page-btn" style="border:none;cursor:default;">...</span>';
            continue;
        }
        btns += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    document.getElementById('pageBtns').innerHTML = btns;
}

function goPage(p) { currentPage = p; renderTable(); }
function changePageSize() { PAGE_SIZE = parseInt(document.getElementById('pageSizeSelect').value); currentPage = 1; renderTable(); }

function toggleAllDb(el) {
    scannerSelectAll = el.checked;
    document.querySelectorAll('.db-check').forEach(cb => cb.checked = el.checked);
    updateDbActions();
}

function updateDbActions() {
    const checked = scannerSelectAll ? filteredData.length : document.querySelectorAll('.db-check:checked').length;
    const btn = document.getElementById('dbDeleteBtn');
    if (checked > 0) { btn.style.display = 'inline-block'; btn.textContent = `${t('del-sel-btn','Seçilenleri Sil')} (${checked})`; }
    else { btn.style.display = 'none'; scannerSelectAll = false; }
}

function deleteSelectedDb() {
    let rows = [];
    if (scannerSelectAll) {
        filteredData.forEach(d => { if (d.source === 'Scanner') rows.push(d.sheet_row); });
    } else {
        document.querySelectorAll('.db-check:checked').forEach(cb => {
            if (cb.dataset.source === 'Scanner') rows.push(parseInt(cb.dataset.row));
        });
    }
    const total = scannerSelectAll ? filteredData.length : document.querySelectorAll('.db-check:checked').length;
    if (!confirm(`${total} ${t('dom-delete-confirm','kayıt silinecek. Emin misiniz?')}`)) return;
    if (!rows.length) { alert(t('db-scanner-only','Sadece Scanner kayıtları silinebilir.')); return; }
    fetch('/api/domains/delete', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({rows})
    }).then(r => r.json()).then(() => { scannerSelectAll = false; document.getElementById('dbCheckAll').checked = false; updateDbActions(); loadData(); });
}

// ─── LEADS ────────────────────────────────────────────────────────────────
function loadLeads() {
    fetch('/api/leads')
        .then(r => r.json())
        .then(response => {
            if (response.error) { alert(response.error); return; }
            leadsData = response.data;
            document.getElementById('badge-leads').textContent = leadsData.length;
            applyLeadsFilters();
        });
}

function applyLeadsFilters() {
    const q = (document.getElementById('leadsSearchBox').value || '').toLowerCase();
    leadsFiltered = leadsData.filter(d => {
        if (!q) return true;
        const s = `${d.first_name} ${d.last_name} ${d.email} ${d.phone} ${d.city}`.toLowerCase();
        return s.includes(q);
    });
    leadsFiltered.sort((a, b) => {
        const va = (a[leadsCurrentSort.field] || '').toLowerCase();
        const vb = (b[leadsCurrentSort.field] || '').toLowerCase();
        const cmp = va.localeCompare(vb, 'tr');
        return leadsCurrentSort.asc ? cmp : -cmp;
    });
    leadsPage = 1;
    renderLeads();
    document.getElementById('leadsStatPills').innerHTML =
        `<div class="stat-pill"><strong>${leadsFiltered.length}</strong> ${t('stat-found','Bulunan')}</div>
         <div class="stat-pill"><strong>${leadsData.filter(d=>d.email).length}</strong> ${t('sm-w-email','E-postalı')}</div>`;
}

function leadsSort(field) {
    if (leadsCurrentSort.field === field) leadsCurrentSort.asc = !leadsCurrentSort.asc;
    else { leadsCurrentSort.field = field; leadsCurrentSort.asc = true; }
    applyLeadsFilters();
}

function renderLeads() {
    const start = (leadsPage - 1) * LEADS_PAGE_SIZE;
    const end = start + LEADS_PAGE_SIZE;
    const pageData = leadsFiltered.slice(start, end);
    const tbody = document.getElementById('leadsTbody');

    if (!pageData.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><h3>${t('dom-no-records','Kayıt bulunamadı')}</h3></td></tr>`;
        document.getElementById('leadsPageInfo').textContent = '-';
        document.getElementById('leadsPageBtns').innerHTML = '';
        return;
    }

    tbody.innerHTML = pageData.map(d => `<tr>
        <td><input type="checkbox" class="leads-check" value="${d.id}" data-row="${d.sheet_row}" onchange="updateLeadsActions()"></td>
        <td>${d.date || '-'}</td>
        <td>${d.first_name || '-'}</td>
        <td>${d.last_name || '-'}</td>
        <td>${d.phone || '-'}</td>
        <td>${d.email || '-'}</td>
        <td>${d.city || '-'}</td>
    </tr>`).join('');

    const totalPages = Math.ceil(leadsFiltered.length / LEADS_PAGE_SIZE);
    document.getElementById('leadsPageInfo').textContent =
        `${start + 1}-${Math.min(end, leadsFiltered.length)} / ${leadsFiltered.length} ${t('sm-records','kayıt')}`;
    let btns = '';
    for (let p = 1; p <= totalPages; p++) {
        if (totalPages > 7 && p > 3 && p < totalPages - 2 && Math.abs(p - leadsPage) > 1) {
            if (p === 4) btns += '<span class="page-btn" style="border:none;cursor:default;">...</span>';
            continue;
        }
        btns += `<button class="page-btn ${p === leadsPage ? 'active' : ''}" onclick="leadsGoPage(${p})">${p}</button>`;
    }
    document.getElementById('leadsPageBtns').innerHTML = btns;
}

function leadsGoPage(p) { leadsPage = p; renderLeads(); }
function changeLeadsPageSize() { LEADS_PAGE_SIZE = parseInt(document.getElementById('leadsPageSizeSelect').value); leadsPage = 1; renderLeads(); }

function toggleAllLeads(el) {
    leadsSelectAll = el.checked;
    document.querySelectorAll('.leads-check').forEach(cb => cb.checked = el.checked);
    updateLeadsActions();
}

function updateLeadsActions() {
    const checked = leadsSelectAll ? leadsFiltered.length : document.querySelectorAll('.leads-check:checked').length;
    const btn = document.getElementById('leadsDeleteBtn');
    if (checked > 0) { btn.style.display = 'inline-block'; btn.textContent = `${t('del-sel-btn','Seçilenleri Sil')} (${checked})`; }
    else { btn.style.display = 'none'; leadsSelectAll = false; }
}

function deleteSelectedLeads() {
    let rows = [];
    if (leadsSelectAll) {
        leadsFiltered.forEach(d => rows.push(d.sheet_row));
    } else {
        document.querySelectorAll('.leads-check:checked').forEach(cb => rows.push(parseInt(cb.dataset.row)));
    }
    const total = leadsSelectAll ? leadsFiltered.length : document.querySelectorAll('.leads-check:checked').length;
    if (!confirm(`${total} ${t('dom-delete-confirm','kayıt silinecek. Emin misiniz?')}`)) return;
    fetch('/api/leads/delete', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({rows})
    }).then(r => r.json()).then(() => { leadsSelectAll = false; document.getElementById('leadsCheckAll').checked = false; updateLeadsActions(); loadLeads(); });
}

// ─── INIT ─────────────────────────────────────────────────────────────────
loadData();
loadLeads();
</script>

</body>
</html>
