<style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .ps-header {
        position: sticky;
        top: 0;
        z-index: 999;
        background: linear-gradient(135deg, #1e293b 0%, #162032 100%);
        border-bottom: 1px solid #334155;
        padding: 0 32px;
        display: flex;
        align-items: center;
        height: 64px;
        backdrop-filter: blur(12px);
    }
    .ps-logo {
        font-size: 20px;
        font-weight: 800;
        color: #f1f5f9;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
        letter-spacing: -0.5px;
    }
    .ps-logo svg { width: 26px; height: 26px; }
    .ps-logo:hover { color: white; }

    .ps-nav { display: flex; gap: 2px; margin-left: auto; }
    .ps-nav a {
        display: flex;
        align-items: center;
        gap: 7px;
        color: #94a3b8;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s ease;
        position: relative;
    }
    .ps-nav a:hover {
        background: rgba(255,255,255,0.05);
        color: #e2e8f0;
    }
    .ps-nav a.active {
        background: rgba(59,130,246,0.12);
        color: #60a5fa;
        font-weight: 600;
    }
    .ps-nav a.active::after {
        content: '';
        position: absolute;
        bottom: -9px;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 3px;
        background: #3b82f6;
        border-radius: 3px;
    }

    /* Icon animasyonu - aktif olanda */
    .ps-nav a svg {
        width: 16px;
        height: 16px;
        transition: transform 0.3s ease;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    .ps-nav a.active svg {
        animation: iconPulse 2s ease-in-out infinite;
    }
    @keyframes iconPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
    }

    /* Header animation area */
    .header-animation {
        flex: 1;
        height: 100%;
        position: relative;
        overflow: hidden;
        margin: 0 16px;
    }
    .matrix-col {
        position: absolute;
        top: -100%;
        font-family: 'JetBrains Mono', 'SF Mono', monospace;
        font-size: 14px;
        line-height: 1.2;
        color: rgba(255,255,255,0.7);
        text-shadow: 0 0 8px rgba(255,255,255,0.3);
        animation: matrixFall linear infinite;
        pointer-events: none;
        white-space: pre;
    }
    @keyframes matrixFall {
        0% { transform: translateY(-100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 0.6; }
        100% { transform: translateY(calc(64px + 100%)); opacity: 0; }
    }
</style>

<script>
function toggleBlUser(e) {
    e.stopPropagation();

}
function toggleBlLang(e) {
    e.stopPropagation();
    const sub  = document.getElementById('blLangSub');
    const chev = document.getElementById('blLangChev');
    const open = sub.style.display === 'none';
    sub.style.display  = open ? 'block' : 'none';
    chev.style.transform = open ? 'rotate(90deg)' : '';

    const wrap = document.getElementById('blUserWrap');
    if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});

<!-- Tarama durum cubugu - tum sayfalarda gorunur -->
<div class="scan-status-bar" id="scanStatusBar">
    <span class="scan-badge active" style="display:inline-block"></span>
    <span id="scanBarText" data-i18n="h-scanning">Taranıyor...</span>
    <div class="mini-progress">
        <div class="mini-progress-fill" id="scanBarProgress" style="width:0%"></div>
    </div>
    <span id="scanBarCount">0/0</span>
    <a href="/app" data-i18n="h-go-scanner">Scanner'a Git →</a>

<script>
// Aktif sayfayi isaretle
(function() {
    const path = location.pathname;
    const navMap = {
        '/app': 'nav-scanner',
        '/external': 'nav-external',
        '/database': 'nav-database',
        '/domains': 'nav-database',
        '/sendmail': 'nav-sendmail',
        '/clickbot': 'nav-clickbot',
        '/marketing': 'nav-marketing',
    };
    // marketing alt sayfaları için de aktif yap
    if (location.pathname.startsWith('/marketing')) {
        const el = document.getElementById('nav-marketing');
        if (el) el.classList.add('active');
    }
    const activeId = navMap[path];
    if (activeId) {
        document.getElementById(activeId).classList.add('active');
    }
})();

// Matrix binary rain
(function initMatrixRain() {
    const container = document.getElementById('headerAnim');
    if (!container) return;
    const COL_COUNT = 25;
    const chars = '01';

    function createColumn() {
        const col = document.createElement('div');
        col.className = 'matrix-col';
        const len = 3 + Math.floor(Math.random() * 5);
        let text = '';
        for (let i = 0; i < len; i++) {
            text += chars[Math.floor(Math.random() * chars.length)] + '\n';
        }
        col.textContent = text;
        col.style.left = Math.random() * 100 + '%';
        col.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
        col.style.animationDelay = Math.random() * 3 + 's';
        col.style.fontSize = (10 + Math.random() * 6) + 'px';
        col.style.opacity = 0.15 + Math.random() * 0.5;
        container.appendChild(col);
        col.addEventListener('animationend', () => {
            col.remove();
            createColumn();
        });
    }

    for (let i = 0; i < COL_COUNT; i++) {
        setTimeout(() => createColumn(), i * 150);
    }
})();

// Global tarama durumu takibi - tum sayfalarda calisir
(function globalScanWatch() {
    const badge = document.querySelector('#nav-scanner .scan-badge') ||
        (() => { const b = document.createElement('span'); b.className = 'scan-badge'; document.getElementById('nav-scanner').appendChild(b); return b; })();
    const bar = document.getElementById('scanStatusBar');

    function checkScan() {
        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                if (data.running) {
                    badge.classList.add('active');
                    // Scanner sayfasinda degilsek alt cubugu goster
                    if (location.pathname !== '/app') {
                        bar.classList.add('active');
                        document.getElementById('scanBarText').textContent = data.status.substring(0, 60);
                        const pct = data.total > 0 ? (data.progress / data.total * 100) : 0;
                        document.getElementById('scanBarProgress').style.width = pct + '%';
                        document.getElementById('scanBarCount').textContent = data.results.length + ' ' + t('h-found', 'bulundu');
                    } else {
                        bar.classList.remove('active');
                    }
                } else {
                    badge.classList.remove('active');
                    bar.classList.remove('active');
                }
            })
            .catch(() => {});
    }

    // Clickbot sayfasinda Scanner polling gereksiz yavaslatiyor - 5sn'ye cikar
    const scanInterval = location.pathname === '/clickbot' ? 10000 : 2000;
    setInterval(checkScan, scanInterval);
    checkScan();
})();

// Footer linkleri ekle (Google botlari icin kesfedilebilir olsun)
(function injectFooter() {
    const footer = document.createElement('div');
    footer.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:997;background:#0f172a;border-top:1px solid #1e293b;padding:8px 32px;display:flex;align-items:center;gap:20px;justify-content:flex-end;';
    footer.innerHTML = '<a href="/en/privacy-policy" style="font-size:11px;color:#475569;text-decoration:none;" onmouseover="this.style.color=\'#94a3b8\'" onmouseout="this.style.color=\'#475569\'">Privacy Policy</a><a href="/en/terms-of-service" style="font-size:11px;color:#475569;text-decoration:none;" onmouseover="this.style.color=\'#94a3b8\'" onmouseout="this.style.color=\'#475569\'">Terms of Service</a><span style="font-size:11px;color:#1e293b;">© 2025 YO Dijital</span>';
    // Scan status bar varsa onun üstüne ekleme, yoksa body'e ekle
    document.body.appendChild(footer);
})();

// Click Bot tarama durumu takibi
(function globalClickBotWatch() {
    const cbBadge = document.querySelector('#nav-clickbot .scan-badge') ||
        (() => { const b = document.createElement('span'); b.className = 'scan-badge'; document.getElementById('nav-clickbot').appendChild(b); return b; })();

    function checkClickBot() {
        fetch('/clickbot/api/stats')
            .then(r => r.json())
            .then(data => {
                if (data.status === 'running' || data.status === 'paused') {
                    cbBadge.classList.add('active');
                } else {
                    cbBadge.classList.remove('active');
                }
            })
            .catch(() => {});
    }

    // Clickbot sayfasinda SocketIO zaten var, badge icin 5sn yeterli
    const cbInterval = location.pathname === '/clickbot' ? 10000 : 2000;
    setInterval(checkClickBot, cbInterval);
    checkClickBot();
})();
</script>
